<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContadorDOM</title>
</head>

<body>

    <h2>Contador de Cliques</h2>
    <p id="contador">0</p>
    <button id="aumentar">Incrementar</button>
    <button id="disminuir">Decrementar</button>

    <hr>

    <h2>Adicionar Texto</h2>
    <input type="text" id="campoTexto" placeholder="Digite algo e pressione Enter..." />
    <p>Caracteres (sem espaços): <span id="contadorCaracteres">0</span></p>
    <div id="areaParagrafos"></div>

    <hr>

    <h2>Adicionar Item em Lista</h2>
    <select id="tipoLista">
        <option value="ul">Lista Não Ordenada</option>
        <option value="ol">Lista Ordenada</option>
    </select>
    <button id="btnAdicionarItem">Adicionar Item</button>
    <div id="areaListas"></div>

    <hr>

    <button id="reset"> Limpar Tudo</button>
    <script src="script.js"></script>
</body>

</html>
